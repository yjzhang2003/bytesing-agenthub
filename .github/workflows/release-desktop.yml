name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Rebuild Electron
        run: pnpm --filter @agenthub/desktop rebuild electron

      - name: Verify
        run: pnpm check

      - name: Validate release endpoints
        env:
          AGENTHUB_CONTROL_PLANE_URL: ${{ vars.AGENTHUB_CONTROL_PLANE_URL }}
          AGENTHUB_WEB_URL: ${{ vars.AGENTHUB_WEB_URL }}
          AGENTHUB_REQUIRE_RELEASE_CONFIG: "1"
        run: |
          node scripts/write-desktop-release-config.mjs
          curl --fail --silent --show-error --head "$AGENTHUB_WEB_URL" >/dev/null
          curl --fail --silent --show-error "$AGENTHUB_CONTROL_PLANE_URL/health" >/dev/null

      - name: Build Desktop package
        env:
          AGENTHUB_CONTROL_PLANE_URL: ${{ vars.AGENTHUB_CONTROL_PLANE_URL }}
          AGENTHUB_WEB_URL: ${{ vars.AGENTHUB_WEB_URL }}
          AGENTHUB_REQUIRE_RELEASE_CONFIG: "1"
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm --filter @agenthub/desktop run dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/release/*
          fail_on_unmatched_files: true
